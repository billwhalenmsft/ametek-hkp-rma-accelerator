<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Filled envelope body in Fluent blue, white inner detail -->
  <rect x="2.5" y="6" width="19" height="13" rx="2" ry="2" fill="#0F6CBD"/>
  <!-- Envelope flap (white V), drawn over the fill -->
  <path d="M3.5 7.5 L12 13.2 L20.5 7.5" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- AI sparkle in top-right corner, 4-point star = "assist" -->
  <g transform="translate(18.5,5.5)">
    <path d="M0 -3.2 L0.7 -0.7 L3.2 0 L0.7 0.7 L0 3.2 L-0.7 0.7 L-3.2 0 L-0.7 -0.7 Z" fill="#FFB900" stroke="#FFFFFF" stroke-width="0.6" stroke-linejoin="round"/>
  </g>
</svg>
