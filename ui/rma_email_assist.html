        // Link the email log to the new claim + mark processed
        return odata("PATCH", "rma_emaillogs(" + rec.rma_emaillogid + ")", {
          "rma_Claim@odata.bind": "/rma_claims(" + newClaim.rma_claimid + ")",
          "rma_isprocessed": true
        }).then(function(){ return newClaim; });
      })
      .then(function(newClaim){
        toast("Claim " + newClaim.rma_claimnumber + " created \u2713");
        lastRerunResult = {
          updated: fields.length,
          message: "Claim " + newClaim.rma_claimnumber + " created with " + fields.length +
                   " field" + (fields.length === 1 ? "" : "s") + ": " + fields.join(", ")
        };
        // Reload to pick up the new linked claim UNLESS the caller is going to
        // chain another action (e.g. send reply) and reload itself afterwards.
        if (!(extras && extras.skipReload)) loadAll(rec.rma_emaillogid);
        return newClaim;
      })
      .catch(function(err){
        console.error("Create claim failed:", err);
        toast("Create claim failed: " + (err.message || err), true);
        if (btn) { btn.disabled = false; btn.textContent = "+ Create Claim"; }
        throw err;
      });
  }

  // ---------- Create Claim modal (region + plant prompt) ----------
  // Loads the plant list (cached after first call), tries to pre-select the
  // plant whose part-prefix matches the extracted Part Number, then shows a
  // modal with the extracted summary + Region/Plant dropdowns. On submit,
  // calls createClaimFromExtraction with the chosen extras.
  function loadPlants(){
    if (PLANTS_CACHE) return Promise.resolve(PLANTS_CACHE);
    return odata("GET", "rma_plants?$select=rma_plantid,rma_name,rma_region,rma_partprefixes&$orderby=rma_name")
      .then(function(res){
        PLANTS_CACHE = (res.value || []).map(function(p){
          var prefixes = (p.rma_partprefixes || "").split(/[,;]/).map(function(s){
            return s.trim().toUpperCase();
          }).filter(Boolean);
          return {
            id: p.rma_plantid,
            name: p.rma_name || "(unnamed)",
            region: p.rma_region,
            prefixes: prefixes
          };
        });
        return PLANTS_CACHE;
      });
  }

  // Pick the best-matching plant for a part number using longest-prefix match.
  // Returns null if no plant prefix matches.
  function suggestPlantForPart(partNumber, plants){
    if (!partNumber || !plants || !plants.length) return null;
    var pn = String(partNumber).toUpperCase();
    var best = null;
    plants.forEach(function(plant){
      plant.prefixes.forEach(function(pref){
        if (pref && pn.indexOf(pref) === 0) {
          if (!best || pref.length > best.prefLen) {
            best = { plant: plant, prefLen: pref.length };
          }
        }
      });
    });
    return best ? best.plant : null;
  }

  // ---------- Send reply to a freshly created claim ----------
  // Used by the Create Claim modal's "Also send drafted reply" path. The form
  // values must be captured BEFORE this runs because the pane is re-rendered
  // when the new claim is loaded. Returns a promise; toasts on failure.
  function sendReplyToNewClaim(newClaim, subj, body, recipient){
    if (!newClaim || !newClaim.rma_claimid) return Promise.reject(new Error("No claim to attach reply to"));
    if (!body) return Promise.reject(new Error("Reply body is empty"));
    if (!recipient || !recipient.email) return Promise.reject(new Error("No recipient email"));
    var userId = getCurrentUserId();
    var rec = currentRecord;
    var htmlBody = '<p>' + esc(body).replace(/\n\n+/g, '</p><p>').replace(/\n/g, '<br/>') + '</p>';

    // 1. Create email activity tied to the NEW claim and mark it Sent
    var emailPayload = {
      subject:     subj,
      description: htmlBody,
      "regardingobjectid_rma_claim@odata.bind": "/rma_claims(" + newClaim.rma_claimid + ")",
      directioncode: true,
      email_activity_parties: userId ? [
        { "partyid_systemuser@odata.bind": "/systemusers(" + userId + ")", participationtypemask: 1 },
        { addressused: recipient.email, participationtypemask: 2 }
      ] : [
        { addressused: recipient.email, participationtypemask: 2 }
      ]
    };

    var emailPromise = userId
      ? odata("POST", "emails", emailPayload).then(function(newEmail){
          var activityId = newEmail.activityid;
          if (!activityId) return { id:null, sent:false };
          return odata("POST", "emails(" + activityId + ")/Microsoft.Dynamics.CRM.SendEmail", { IssueSend: false })
            .then(function(){ return { id: activityId, sent: true }; })
            .catch(function(){
              return odata("PATCH", "emails(" + activityId + ")", { statecode: 1, statuscode: 3 })
                .then(function(){ return { id: activityId, sent: true }; })
                .catch(function(){ return { id: activityId, sent: false }; });
            });
        })
      : Promise.resolve({ id:null, sent:false });

    return emailPromise.then(function(emailResult){
      // 2. Outbound rma_emaillog row (queue tracking)
      var outRec = {
        rma_subject: subj,
        rma_body: body,
        rma_direction: OUTBOUND,
        rma_recipient: recipient.email,
        rma_sentby: getUserDisplayName(),
        rma_sentdate: new Date().toISOString(),
        rma_isprocessed: true,
        rma_templateused: selectedTemplate ? selectedTemplate.rma_name : "Custom reply",
        "rma_Claim@odata.bind": "/rma_claims(" + newClaim.rma_claimid + ")"
      };
      return odata("POST", "rma_emaillogs", outRec).then(function(){
        var msg = "Claim " + newClaim.rma_claimnumber + " created and reply sent to " + recipient.email + " \u2713";
        if (emailResult && emailResult.sent === false && emailResult.id) msg = "Claim " + newClaim.rma_claimnumber + " created; reply logged as Draft (mailbox not configured) \u2713";
        toast(msg);
      });
    });
  }

  // ---------- Connect this email to an existing claim ----------
  // Opens a search modal. User types in part of a claim number or customer
  // name/email; we query /rma_claims and show up to 20 results. Selecting a
  // row PATCHes the email log to point at the claim and marks it processed,
  // then advances to the next email in the inbox.
  function showConnectClaimModal(){
    var rec = currentRecord;
    if (!rec) return;
    if (rec.rma_Claim) { toast("This email is already linked to a claim", true); return; }

    // Suggest initial search text from the extracted/parsed sender info
    var edits = readEditedFieldValues();
    var initialQuery = (edits.rma_customername || edits.rma_customeremail || "").trim();

    var bg = document.createElement("div");
    bg.className = "cc-modal-bg";
    bg.innerHTML =
      '<div class="cc-modal cn-modal">'+
        '<h3>Connect to Existing Claim <button class="cc-close" id="cn-close-btn" title="Cancel">\u2715</button></h3>'+
        '<div class="cc-body">'+
          '<div class="cn-hint">Search by <b>claim number</b>, <b>customer name</b>, or <b>customer email</b>. Selecting a claim will link this email to it and mark the email as processed.</div>'+
          '<input id="cn-search" class="cn-search" type="text" placeholder="Type at least 2 characters\u2026" value="'+esc(initialQuery)+'"/>'+
          '<div class="cc-error" id="cn-error"></div>'+
          '<div class="cn-results" id="cn-results"><div class="cn-empty">Type above to search.</div></div>'+
        '</div>'+
        '<div class="cc-actions">'+
          '<button class="secondary" id="cn-cancel-btn">Cancel</button>'+
          '<button class="primary" id="cn-connect-btn" disabled>Connect</button>'+
        '</div>'+
      '</div>';
    document.body.appendChild(bg);

    var $$ = function(id){ return document.getElementById(id); };
    var closeModal = function(){ if (bg.parentNode) bg.parentNode.removeChild(bg); };
    var showError = function(msg){
      var e = $$("cn-error");
      e.textContent = msg;
      e.classList.add("show");
    };

    $$("cn-close-btn").addEventListener("click", closeModal);
    $$("cn-cancel-btn").addEventListener("click", closeModal);
    bg.addEventListener("click", function(e){ if (e.target === bg) closeModal(); });

    var selectedClaimId = null;
    var selectedClaimNumber = "";
    var searchTimer = null;
    var lastQuery = "";

    function runSearch(q){
      $$("cn-error").classList.remove("show");
      var qt = (q || "").trim();
      if (qt.length < 2) {
        $$("cn-results").innerHTML = '<div class="cn-empty">Type at least 2 characters to search.</div>';
        selectedClaimId = null;
        $$("cn-connect-btn").disabled = true;
        return;
      }
      lastQuery = qt;
      $$("cn-results").innerHTML = '<div class="cn-loading">Searching\u2026</div>';
      var qs = qt.replace(/'/g, "''");
      var filter = "contains(rma_claimnumber,'"+qs+"') or contains(rma_customername,'"+qs+"') or contains(rma_customeremail,'"+qs+"') or contains(rma_contactname,'"+qs+"')";
      var path = "rma_claims?$select=rma_claimid,rma_claimnumber,rma_customername,rma_customeremail,rma_contactname,rma_status,rma_partnumber,createdon" +
                 "&$filter=" + encodeURIComponent(filter) +
                 "&$orderby=createdon desc&$top=20";
      odata("GET", path).then(function(r){
        if (qt !== lastQuery) return; // stale response
        var rows = (r && r.value) || [];
        if (!rows.length) {
          $$("cn-results").innerHTML = '<div class="cn-empty">No matching claims found. Try a different search.</div>';
          selectedClaimId = null;
          $$("cn-connect-btn").disabled = true;
          return;
        }
        var html = rows.map(function(c){
          var cust = esc(c.rma_customername || c.rma_contactname || c.rma_customeremail || "(no customer)");
          var part = c.rma_partnumber ? '<span class="cn-pill">'+esc(c.rma_partnumber)+'</span>' : '';
          var dt = c.createdon ? new Date(c.createdon).toLocaleDateString() : "";
          return '<div class="cn-row" data-id="'+c.rma_claimid+'" data-num="'+esc(c.rma_claimnumber||"")+'">'+
                   '<div class="cn-num">'+esc(c.rma_claimnumber||"(no #)")+'</div>'+
                   '<div class="cn-cust">'+cust+part+'</div>'+
                   '<div class="cn-meta">'+esc(dt)+'</div>'+
                 '</div>';
        }).join('');
        $$("cn-results").innerHTML = html;
        Array.prototype.forEach.call(document.querySelectorAll("#cn-results .cn-row"), function(row){
          row.addEventListener("click", function(){
            Array.prototype.forEach.call(document.querySelectorAll("#cn-results .cn-row"), function(r){ r.classList.remove("selected"); });
            row.classList.add("selected");
            selectedClaimId = row.getAttribute("data-id");
            selectedClaimNumber = row.getAttribute("data-num");
            $$("cn-connect-btn").disabled = false;
          });
          row.addEventListener("dblclick", function(){
            row.click();
            $$("cn-connect-btn").click();
          });
        });
      }).catch(function(err){
        if (qt !== lastQuery) return;
        $$("cn-results").innerHTML = '<div class="cn-empty">Search failed: '+esc(err.message || String(err))+'</div>';
      });
    }

    $$("cn-search").addEventListener("input", function(){
      var q = this.value;
      if (searchTimer) clearTimeout(searchTimer);
      searchTimer = setTimeout(function(){ runSearch(q); }, 250);
    });

    // Run an initial search if we have suggested text
    if (initialQuery) runSearch(initialQuery);
    setTimeout(function(){ $$("cn-search").focus(); $$("cn-search").select(); }, 50);

    $$("cn-connect-btn").addEventListener("click", function(){
      if (!selectedClaimId) return;
      var btn = $$("cn-connect-btn");
      btn.disabled = true; btn.textContent = "Connecting\u2026";
      connectToClaim(selectedClaimId, selectedClaimNumber)
        .then(function(){ closeModal(); })
        .catch(function(err){
          btn.disabled = false; btn.textContent = "Connect";
          showError("Connect failed: " + (err.message || err));
        });
    });
  }

  // PATCH the current email log to point at an existing claim, mark it
  // processed, toast, and advance to the next unprocessed email.
  function connectToClaim(claimId, claimNumber){
    var rec = currentRecord;
    if (!rec) return Promise.reject(new Error("No current record"));
    return odata("PATCH", "rma_emaillogs(" + rec.rma_emaillogid + ")", {
      "rma_Claim@odata.bind": "/rma_claims(" + claimId + ")",
      "rma_isprocessed": true
    }).then(function(){
      toast("Connected to " + (claimNumber || "claim") + " \u2713");
      advanceToNext();
    });
  }

  function showCreateClaimModal(){
    var rec = currentRecord;
    if (!rec) return;
    if (rec.rma_Claim) { toast("Claim already exists for this email", true); return; }

    // Snapshot current edited values so the modal can show them.
    var edits = readEditedFieldValues();
    var labels = edits.__labels || {};
    var summaryHtml = "";
    EXTRACTION_RULES.forEach(function(rule){
      if (typeof rule.extract !== "function") return;
      var v = edits[rule.claimField];
      var valHtml = (v == null || v === "")
        ? '<span class="cc-sum-val empty">(not set)</span>'
        : '<span class="cc-sum-val">'+esc(String(v))+'</span>';
      summaryHtml += '<div class="cc-sum-row"><span class="cc-sum-lbl">'+esc(rule.label)+':</span>'+valHtml+'</div>';
    });

    // Capture any drafted reply BEFORE building the modal — once we open it,
    // the user may close it without sending, but if they DO check "also send"
    // we need the body that was on screen at click time (the pane gets
    // re-rendered after create which would wipe the textarea).
    var replyBodyEl  = document.getElementById("reply-body");
    var replySubjEl  = document.getElementById("reply-subj");
    var draftedBody  = replyBodyEl ? (replyBodyEl.value || "").trim() : "";
    var draftedSubj  = replySubjEl ? (replySubjEl.value || "").trim() : "";
    var hasDraft     = !!draftedBody;
    var alsoSendRow  = hasDraft
      ? '<div class="cc-also-send">'+
          '<input type="checkbox" id="cc-also-send" checked />'+
          '<label for="cc-also-send"><b>Also send the drafted reply</b> ('+draftedBody.length+' chars) once the claim is created.'+
            '<div class="cc-also-send-meta">Reply will be linked to the new claim and the email marked processed in one click.</div>'+
          '</label>'+
        '</div>'
      : '<div class="cc-also-send disabled" title="Type a reply in the right pane to enable one-click send">'+
          '<input type="checkbox" disabled />'+
          '<label><b>Also send the drafted reply</b> &mdash; not available'+
            '<div class="cc-also-send-meta">Draft a reply in the pane first (or use a template) to enable one-click create + send.</div>'+
          '</label>'+
        '</div>';

    // Build modal shell (without dropdowns yet \u2014 loaded async)
    var bg = document.createElement("div");
    bg.className = "cc-modal-bg";
    bg.innerHTML =
      '<div class="cc-modal">'+
        '<h3>Create Claim <button class="cc-close" id="cc-close-btn" title="Cancel">\u2715</button></h3>'+
        '<div class="cc-body">'+
          '<div class="cc-error" id="cc-error"></div>'+
          '<div class="cc-section-title">Extracted from email</div>'+
          '<div class="cc-summary">'+summaryHtml+'</div>'+
          '<div class="cc-section-title">Assignment</div>'+
          '<div class="cc-field">'+
            '<label for="cc-region">Customer Region<span class="req">*</span></label>'+
            '<select id="cc-region"><option value="">\u2014 Select \u2014</option>'+
            REGIONS.map(function(r){
              return '<option value="'+r.value+'">'+esc(r.label)+'</option>';
            }).join('')+
            '</select>'+
          '</div>'+
          '<div class="cc-field">'+
            '<label for="cc-plant">Assigned Plant<span class="req">*</span></label>'+
            '<select id="cc-plant" disabled><option>Loading plants\u2026</option></select>'+
            '<div class="cc-hint" id="cc-plant-hint"></div>'+
          '</div>'+
          alsoSendRow +
        '</div>'+
        '<div class="cc-actions">'+
          '<button class="secondary" id="cc-cancel-btn">Cancel</button>'+
          '<button class="primary" id="cc-create-btn" disabled>'+(hasDraft ? "Create Claim & Send Reply" : "Create Claim")+'</button>'+
        '</div>'+
      '</div>';
    document.body.appendChild(bg);

    var $$ = function(id){ return document.getElementById(id); };
    var closeModal = function(){ if (bg.parentNode) bg.parentNode.removeChild(bg); };
    var showError = function(msg){
      var e = $$("cc-error");
      e.textContent = msg;
      e.classList.add("show");
    };

    $$("cc-close-btn").addEventListener("click", closeModal);
    $$("cc-cancel-btn").addEventListener("click", closeModal);
    bg.addEventListener("click", function(e){ if (e.target === bg) closeModal(); });

    // Load plants then populate the Plant dropdown + pre-select by part prefix
    loadPlants().then(function(plants){
      var partNum = edits.rma_partnumber || "";
      var suggested = suggestPlantForPart(partNum, plants);
      var plantSel = $$("cc-plant");
      plantSel.innerHTML = '<option value="">\u2014 Select \u2014</option>' +
        plants.map(function(p){
          return '<option value="'+p.id+'" data-region="'+(p.region||"")+'">'+esc(p.name)+'</option>';
        }).join('');
      plantSel.disabled = false;
      if (suggested) {
        plantSel.value = suggested.id;
        $$("cc-plant-hint").textContent = "Suggested from part prefix on \"" + partNum + "\". Override if wrong.";
        // Auto-fill region from the suggested plant's region
        if (suggested.region != null) $$("cc-region").value = String(suggested.region);
      } else if (partNum) {
        $$("cc-plant-hint").textContent = "No plant matched part number \"" + partNum + "\". Pick one.";
      }
      updateCreateBtn();
    }).catch(function(err){
      console.error("loadPlants failed:", err);
      $$("cc-plant").innerHTML = '<option value="">(failed to load \u2014 ' + (err.message || err) + ')</option>';
      showError("Could not load plant list: " + (err.message || err));
    });

    // Auto-fill region when plant changes (plant carries its home region)
    $$("cc-plant").addEventListener("change", function(){
      var opt = $$("cc-plant").selectedOptions[0];
      var region = opt ? opt.getAttribute("data-region") : "";
      if (region) $$("cc-region").value = region;
      updateCreateBtn();
    });
    $$("cc-region").addEventListener("change", updateCreateBtn);

    // Toggle the primary button label when "also send reply" is checked/unchecked
    var alsoSendBox = $$("cc-also-send");
    if (alsoSendBox) {
      alsoSendBox.addEventListener("change", function(){
        var b = $$("cc-create-btn");
        if (b) b.textContent = alsoSendBox.checked ? "Create Claim & Send Reply" : "Create Claim";
      });
    }

    function updateCreateBtn(){
      var ok = !!$$("cc-region").value && !!$$("cc-plant").value;
      $$("cc-create-btn").disabled = !ok;
    }

    // Submit
    $$("cc-create-btn").addEventListener("click", function(){
      var region = parseInt($$("cc-region").value, 10);
      var plantId = $$("cc-plant").value;
      if (isNaN(region) || !plantId) { showError("Region and Plant are required."); return; }

      // Decide whether to chain a reply send after claim creation
      var alsoSend = !!(alsoSendBox && alsoSendBox.checked && hasDraft);
      var recipient = alsoSend ? getReplyRecipient() : null;
      if (alsoSend) {
        if (!recipient.email) {
          showError("No recipient email \u2014 cannot send reply. Uncheck \u201CAlso send\u201D or fix the address.");
          return;
        }
        // Warn on unfilled placeholder tokens
        var unfilled = (draftedSubj + "\n" + draftedBody).match(/\{[a-zA-Z][a-zA-Z0-9_]*\}/g);
        if (unfilled && unfilled.length > 0) {
          var uniq = unfilled.filter(function(v,i,a){ return a.indexOf(v) === i; }).join(", ");
          if (!confirm("The drafted reply still contains unfilled placeholders: " + uniq + "\n\nSend anyway?")) return;
        }
      }

      var btn = $$("cc-create-btn");
      btn.disabled = true; btn.textContent = "Creating\u2026";
      createClaimFromExtraction({ region: region, plantId: plantId, skipReload: alsoSend })
        .then(function(newClaim){
          if (!alsoSend) { closeModal(); return; }
          btn.textContent = "Sending reply\u2026";
          return sendReplyToNewClaim(newClaim, draftedSubj, draftedBody, recipient)
            .then(function(){
              closeModal();
              advanceToNext();
            });
        })
        .catch(function(err){
          btn.disabled = false;
          btn.textContent = (alsoSendBox && alsoSendBox.checked) ? "Create Claim & Send Reply" : "Create Claim";
          showError("Failed: " + (err.message || err));
        });
    });
  }

  // ---------- Save Edits to Claim ----------
  // PATCHes the linked claim with the current values from the editable
  // extracted-field inputs. Unlike the old "re-run extraction" feature,
  // this DOES overwrite existing values \u2014 it's the explicit save path
  // for user corrections and "Use selection" captures.
  function saveEditsToClaim(){
    var rec = currentRecord;
    if (!rec) return;
    var claim = rec.rma_Claim;
    if (!claim || !claim.rma_claimid) {
      toast("No linked claim to update", true);
      return;
    }

    var edits = readEditedFieldValues();
    var labels = edits.__labels || {};
    delete edits.__labels;

    // Only PATCH fields whose value differs from what's already on the claim.
    var patch = {};
    var changed = [];
    Object.keys(edits).forEach(function(k){
      var newV = edits[k];
      var oldV = claim[k];
      // Loose equality so "5" == 5 works for ints
      if (String(oldV == null ? "" : oldV) !== String(newV == null ? "" : newV)) {
        patch[k] = newV;
        changed.push((labels[k] || k) + ": " + String(newV).slice(0, 40));
        // Optimistic local update so the panel reflects the saved value
        claim[k] = newV;
      }
    });

    var btn = $("btn-rerun");
    if (btn) { btn.disabled = true; btn.textContent = "Saving\u2026"; }

    if (Object.keys(patch).length === 0) {
      lastRerunResult = {
        updated: 0,
        message: "No changes to save. Edit any field above and click again."
      };
      if (btn) { btn.disabled = false; btn.textContent = "\uD83D\uDCBE Save to Claim"; }
      render();
      return;
    }

    odata("PATCH", "rma_claims(" + claim.rma_claimid + ")", patch)
      .then(function(){
        lastRerunResult = {
          updated: changed.length,
          message: "Saved " + changed.length + " field" + (changed.length===1?"":"s") +
                   " to claim: " + changed.join("; ")
        };
        toast("Saved \u2713");
        render();
      })
      .catch(function(err){
        console.error("Save edits PATCH failed:", err);
        lastRerunResult = {
          updated: 0,
          message: "Save failed: " + (err.message || err)
        };
        if (btn) { btn.disabled = false; btn.textContent = "\uD83D\uDCBE Save to Claim"; }
        render();
      });
  }

  // ---------- Linked Claim card ----------
  // Compact card at the top of the pane that summarises the linked claim and
  // gives a one-click way to jump to its form. Only rendered when a claim
  // exists. Replaces the small "Claim: RMA-..." link in the header.
  function renderLinkedClaimCard(rec){
    var claim = rec.rma_Claim;
    if (!claim) return "";
    var statusVal   = claim.rma_status;
    var statusKey   = STATUS_KEY[statusVal] || "new";
    var statusLabel = claim["rma_status@OData.Community.Display.V1.FormattedValue"] || STATUS_LABEL[statusVal] || "\u2014";
    var ageStr = "";
    if (claim.rma_createddate) {
      var d = new Date(claim.rma_createddate);
      var diff = Math.floor((Date.now() - d.getTime()) / 86400000);
      ageStr = diff === 0 ? "today" : (diff + "d old");
    }
    var custName = claim.rma_customername || claim.rma_contactname || "(unknown customer)";
    return '<div class="linked-claim">'+
      '<div class="card">'+
        '<div class="num">'+esc(claim.rma_claimnumber || "(unnamed)")+'</div>'+
        '<span class="status-pill status-'+statusKey+'">'+esc(statusLabel)+'</span>'+
        '<div class="meta">'+esc(custName)+(ageStr ? ' \u00B7 '+esc(ageStr) : '')+'</div>'+
        '<button class="open-btn" id="btn-open-claim" data-claim="'+claim.rma_claimid+'">Open \u2197</button>'+
      '</div>'+
    '</div>';
  }

  // ---------- Resolve / Advance section ----------
  // Mirrors the ribbon Resolve/Deny buttons inside the pane and adds an
  // "Advance status" button that walks the claim through New \u2192 Triage
  // \u2192 Investigation \u2192 Decision without resolving. Resolution actions
  // PATCH the claim AND pre-fill a matching customer reply template.
  function renderResolveSection(rec){
    var claim = rec.rma_Claim;
    if (!claim) return "";
    var statusVal = claim.rma_status;
    if (statusVal === STATUS.CLOSED) {
      var resLabel = claim["rma_resolution@OData.Community.Display.V1.FormattedValue"] || "Closed";
      return '<div class="resolve-section">'+
        '<details>'+
          '<summary>Claim Actions <span class="rs-summary-tag"><span class="tag-closed">\u2713 CLOSED \u00B7 '+esc(resLabel)+'</span></span></summary>'+
          '<div class="rs-body">'+
            '<div class="rs-closed">\u2713 This claim is closed ('+esc(resLabel)+'). No further actions available from the pane.</div>'+
          '</div>'+
        '</details>'+
      '</div>';
    }
    // Next-stage advance button
    var nextStage = null, nextLabel = null;
    if (statusVal === STATUS.NEW)                { nextStage = STATUS.TRIAGE;        nextLabel = "Triage"; }
    else if (statusVal === STATUS.TRIAGE)        { nextStage = STATUS.INVESTIGATION; nextLabel = "Investigation"; }
    else if (statusVal === STATUS.INVESTIGATION) { nextStage = STATUS.DECISION;      nextLabel = "Decision"; }
    var advanceHtml = nextStage
      ? '<div class="rs-buttons single"><button class="rs-btn advance" data-stage="'+nextStage+'">\u2192 Move to '+esc(nextLabel)+'</button></div>'
      : '<div class="rs-decision-note">At Decision stage \u2014 choose a resolution below to close.</div>';
    return '<div class="resolve-section">'+
      '<details open>'+
        '<summary>Claim Actions <span class="rs-summary-tag"><span class="tag-action">ACTION REQUIRED</span></span></summary>'+
        '<div class="rs-body">'+
          '<div class="rs-grp">Advance status</div>'+
          advanceHtml +
          '<div class="rs-grp">Resolve &amp; close</div>'+
          '<div class="rs-buttons">'+
            '<button class="rs-btn resolve" data-res="'+RESOLUTION.CREDIT+'">$ Credit Issued</button>'+
            '<button class="rs-btn resolve" data-res="'+RESOLUTION.REPLACEMENT+'">\u{1F4E6} Replacement Sent</button>'+
            '<button class="rs-btn resolve" data-res="'+RESOLUTION.REPAIR+'">\u{1F527} Repair Completed</button>'+
            '<button class="rs-btn deny"    data-res="'+RESOLUTION.DENIED+'">\u2717 Deny Claim</button>'+
          '</div>'+
        '</div>'+
      '</details>'+
    '</div>';
  }

  // ---------- Status / Resolution actions ----------
  function advanceClaimStatus(toStatus){
    var claim = currentRecord && currentRecord.rma_Claim;
    if (!claim || !claim.rma_claimid) { toast("No linked claim", true); return; }
    var label = STATUS_LABEL[toStatus] || "next stage";
    if (!confirm("Advance claim " + claim.rma_claimnumber + " to " + label + "?")) return;
    odata("PATCH", "rma_claims(" + claim.rma_claimid + ")", { rma_status: toStatus })
      .then(function(){
        toast("Status \u2192 " + label + " \u2713");
        loadAll(currentRecord.rma_emaillogid);
      })
      .catch(function(err){
        console.error("Status update failed:", err);
        toast("Status update failed: " + (err.message || err), true);
      });
  }

  function resolveClaim(resolutionVal){
    var claim = currentRecord && currentRecord.rma_Claim;
    if (!claim || !claim.rma_claimid) { toast("No linked claim", true); return; }
    var resLabel = RESOLUTION_LABEL[resolutionVal] || "Resolved";
    if (!confirm("Close claim " + claim.rma_claimnumber + " with resolution:\n\n  " + resLabel +
                 "\n\nA reply draft will be pre-filled for review.")) return;
    var patch = {
      rma_status:     STATUS.CLOSED,
      rma_resolution: resolutionVal,
      rma_closeddate: new Date().toISOString()
    };
    odata("PATCH", "rma_claims(" + claim.rma_claimid + ")", patch)
      .then(function(){
        // Optimistic local update so token interpolation picks up the new values
        claim.rma_status     = STATUS.CLOSED;
        claim.rma_resolution = resolutionVal;
        claim["rma_status@OData.Community.Display.V1.FormattedValue"]     = "Closed";
        claim["rma_resolution@OData.Community.Display.V1.FormattedValue"] = resLabel;
        toast("Claim closed: " + resLabel + " \u2713");
        // Re-render so the resolve section flips to closed-state + linked card updates
        render();
        // Pre-fill the matching reply template
        var tplKey = (resolutionVal === RESOLUTION.DENIED) ? "denied" : "resolved";
        fillBuiltInTemplate(tplKey);
        setTimeout(function(){
          var ta = document.querySelector(".reply textarea");
          if (ta) { ta.focus(); ta.scrollIntoView({ behavior:"smooth", block:"center" }); }
        }, 80);
      })
      .catch(function(err){
        console.error("Resolve failed:", err);
        toast("Resolve failed: " + (err.message || err), true);
      });
  }

  // ---------- Built-in template fill ----------
  function fillBuiltInTemplate(key){
    var tpl = BUILTIN_TEMPLATES.filter(function(t){ return t.key === key; })[0];
    if (!tpl) return;
    var claim = (currentRecord && currentRecord.rma_Claim) || {};
    // Pre-merge tokens that aren't in applyTokens: {subject} and {resolution_label}
    var extras = {
      subject:          currentRecord ? (currentRecord.rma_subject || "") : "",
      resolution_label: claim["rma_resolution@OData.Community.Display.V1.FormattedValue"] || "\u2014"
    };
    function applyExtras(s){
      return s.replace(/\{(subject|resolution_label)\}/g, function(_, t){ return extras[t] || ""; });
    }
    var subj = applyTokens(applyExtras(tpl.subject));
    var body = applyTokens(applyExtras(tpl.body));
    $("reply-subj").value = subj;
    $("reply-body").value = body;
    selectedTemplate = { rma_name: "Built-in: " + tpl.label, rma_emailtemplateid: "builtin_" + tpl.key };
    // Toggle active state on the built-in button row
    document.querySelectorAll(".tpl-btn").forEach(function(b){ b.classList.remove("active"); });
    document.querySelectorAll(".bt").forEach(function(b){ b.classList.remove("active"); });
    var btn = document.querySelector('.bt[data-key="' + key + '"]');
    if (btn) btn.classList.add("active");
    // If the preview pane is showing, refresh it with the new content
    updateReplyPreview();
  }

  // ---------- Reply preview (token-resolved Outlook-style read-only render) ----------
  // Shown on demand via the "Preview" toggle next to the Reply label. Re-runs the
  // user's current draft through applyTokens() so unresolved tokens are visible
  // and highlighted (helps catch missing {first_name} / {claim_number} before send).
  function updateReplyPreview(){
    var pv = document.getElementById("reply-preview");
    if (!pv || pv.style.display === "none") return;
    var subjEl = document.getElementById("reply-subj");
    var bodyEl = document.getElementById("reply-body");
    var subj = subjEl ? subjEl.value : "";
    var body = bodyEl ? bodyEl.value : "";
    // applyTokens replaces known tokens; unknown ones remain as {literal}
    var resolvedSubj = applyTokens(subj);
    var resolvedBody = applyTokens(body);
    // Highlight any unresolved {token} so the user can spot them
    function highlightUnresolved(s){
      // esc first, then convert {something} into a colored chip
      var safe = esc(s);
      return safe.replace(/\{([a-z0-9_]+)\}/gi, function(m){
        return '<span class="pv-unresolved" title="This placeholder couldn\u2019t be filled in \u2014 it will be sent to the customer literally as &quot;' + m + '&quot;. Edit the reply to remove it.">' + m + '</span>';
      });
    }
    var recipient = getReplyRecipient();
    var toLine = recipient.email
      ? (recipient.name ? esc(recipient.name) + ' &lt;' + esc(recipient.email) + '&gt;' : esc(recipient.email))
      : '<span style="color:#a8732a">(no recipient \u2014 cannot send)</span>';
    pv.innerHTML =
      '<div class="reply-preview-head">'+
        '<span>\u{1F441} What the customer will see</span>'+
        '<span class="pv-tag">placeholders filled in</span>'+
      '</div>'+
      '<div class="reply-preview-meta">'+
        '<div class="pv-row"><b>To:</b> ' + toLine + '</div>'+
        '<div class="pv-row"><b>Subject:</b> ' + highlightUnresolved(resolvedSubj || '(no subject)') + '</div>'+
      '</div>'+
      '<div class="reply-preview-body">' + highlightUnresolved(resolvedBody || '(empty)') + '</div>';
  }

  // ---------- current user (for email activity sender) ----------
  function getCurrentUserId(){
    var X = getParentXrm();
    if (X && X.Utility && X.Utility.getGlobalContext) {
      try {
        var id = X.Utility.getGlobalContext().userSettings.userId || "";
        return id.replace(/[{}]/g, "");
      } catch(e){}
    }
    return null;
  }

  // ---------- render ----------
  function renderInboxZero(){
    $("pane").innerHTML =
      '<div class="empty-state">' +
        '<div class="big">🎉</div>' +
        '<h3>Inbox zero!</h3>' +
        '<p>All unprocessed inbound emails have been handled.</p>' +
        '<button class="btn primary" onclick="window.parent.Xrm.Navigation.navigateTo({pageType:&quot;entitylist&quot;,entityName:&quot;rma_emaillog&quot;})">Back to inbox</button>' +
      '</div>';
  }

  function render(){
    var rec = currentRecord;
    var procPill = rec.rma_isprocessed === true
      ? '<span class="pill proc">Processed</span>'
      : '<span class="pill unproc">Unprocessed</span>';

    var body = rec.rma_body || rec.rma_bodypreview || "";
    var bodyHtml = body
      ? (looksLikeHtml(body) ? sanitize(body) : formatPlainTextEmail(body))
      : '<em style="color:#888">No body captured.</em>';

    // Sender display: prefer the actual person's name when known (extracted
    // from the body for web-form intake; otherwise the linked claim contact)
    // so the header reads like a real email instead of "noreply@ametek.com".
    var claim = rec.rma_Claim || {};
    var hasClaim = !!(claim && claim.rma_claimid);
    var senderExt = {};
    if (!hasClaim) {
      try { senderExt = getEffectiveExtraction(rec) || {}; } catch (e) { senderExt = {}; }
    }
    var fromAddr = rec.rma_fromaddress || "";
    var senderName = claim.rma_contactname || claim.rma_customername
                  || senderExt.rma_contactname || senderExt.rma_customername || "";
    var senderEmail = senderExt.rma_customeremail || claim.rma_customeremail || fromAddr || "";
    var receivedFmt = rec["rma_receiveddate@OData.Community.Display.V1.FormattedValue"] || "";
    var avatarChars = initialsFor(senderName, senderEmail);
    var senderRowHtml =
      '<div class="sender-row">'+
        '<div class="avatar">'+esc(avatarChars)+'</div>'+
        '<div class="who">'+
          '<div class="who-name">'+esc(senderName || senderEmail || "(unknown sender)")+'</div>'+
          '<div class="who-meta">'+
            (senderName && senderEmail ? '&lt;'+esc(senderEmail)+'&gt;' : '') +
            (fromAddr && senderEmail && fromAddr.toLowerCase() !== senderEmail.toLowerCase()
              ? ' &middot; <span style="color:#888">via '+esc(fromAddr)+'</span>' : '') +
          '</div>'+
        '</div>'+
        (receivedFmt ? '<div class="when">'+esc(receivedFmt)+'</div>' : '') +
      '</div>';

    // Built-in quick templates row — always shown. The kbd hint badges (1..4)
    // double as a keyboard cheat-sheet so users can press 1-4 to apply.
    var builtinTplHtml = '<div class="builtin-templates">' +
      BUILTIN_TEMPLATES.map(function(t, i){
        return '<button class="bt" data-key="'+t.key+'"><span class="kn">'+(i+1)+'</span>'+esc(t.label)+'</button>';
      }).join('') +
    '</div>';

    var tplHtml = "";
    if (templates.length === 0) {
      tplHtml = '<div class="tpl-empty" style="font-size:11px;color:#888;font-style:italic;">(no custom templates in Dataverse)</div>';
    } else {
      tplHtml = templates.map(function(t){
        return '<button class="tpl-btn" data-id="'+t.rma_emailtemplateid+'">'+
          '<div class="tpl-name">'+esc(t.rma_name)+'</div>'+
          (t.rma_subject ? '<div class="tpl-sub">'+esc(t.rma_subject)+'</div>' : '') +
        '</button>';
      }).join('');
    }

    // Recipient row (single source of truth used by render + send)
    var recipient = getReplyRecipient();
    var toRowHtml;
    if (recipient.email) {
      toRowHtml = '<div class="to-row">'+
        '<span class="to-label">To:</span> '+
        (recipient.name ? '<span class="to-name">'+esc(recipient.name)+'</span> <span class="to-addr">&lt;'+esc(recipient.email)+'&gt;</span>'
                        : '<span class="to-name">'+esc(recipient.email)+'</span>')+
      '</div>';
    } else {
      toRowHtml = '<div class="to-row"><span class="to-label">To:</span> <span class="to-warn">(no recipient email \u2014 cannot send)</span></div>';
    }

    $("pane").innerHTML =
      '<div class="hdr">'+
        '<div class="subj">'+esc(rec.rma_subject||"(no subject)")+procPill+'</div>'+
        senderRowHtml +
      '</div>'+
      // Three named columns. CSS decides how many show side-by-side based on
      // the layout pick (Auto / 2 col / 3 col) + screen width:
      //   EMAIL : just the raw email body (reading)
      //   DATA  : linked claim card + extracted data + claim actions (review)
      //   REPLY : templates + reply box + send/skip/done actions (composing)
      // In 2-col mode, EMAIL and DATA stack into the left column.
      // In stacked (narrow) mode all three flow vertically.
      '<div class="pane-cols">'+
        '<div class="pane-col pane-col-email">'+
          '<div class="body-wrap">'+
            '<div class="body-label">Email body</div>'+
            '<div class="body">'+bodyHtml+'</div>'+
          '</div>'+
        '</div>'+
        '<div class="pane-col pane-col-data">'+
          renderLinkedClaimCard(rec)+
          renderExtractedPanel(rec)+
          renderResolveSection(rec)+
        '</div>'+
        '<div class="pane-col pane-col-reply">'+
          '<div class="templates">'+
            '<div class="lbl">Reply with template</div>'+
            // When no claim is linked, the {claim_number} / {customer_name} etc.
            // placeholders won't auto-fill on the built-in templates. Give the
            // user a one-click escape hatch to open the Create Claim modal first.
            (function(){
              var hasClaim = !!rec._rma_claim_value;
              if (hasClaim) return "";
              return '<div class="tpl-no-claim-tip">'+
                '<span>\u26A0\uFE0F No claim linked yet. Placeholders like <code>{claim_number}</code> won\u2019t fill in.</span> '+
                '<button class="tip-link" id="btn-create-claim-from-tip" type="button">+ Create claim first</button>'+
              '</div>';
            })() +
            builtinTplHtml +
            tplHtml +
          '</div>'+
          '<div class="reply">'+
            '<div class="lbl-row">'+
              '<div class="lbl">Reply (edit before sending)</div>'+
              '<span class="kbd-hint"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> sends</span>'+
              '<button class="reply-preview-toggle" id="btn-preview-toggle" type="button" title="Show what the customer will see (placeholders like {first_name} filled in with real values)">\u{1F441} Preview</button>'+
            '</div>'+
            toRowHtml +
            '<input id="reply-subj" class="subj-in" placeholder="Subject" value="Re: '+esc(rec.rma_subject||"")+'"/>'+
            '<textarea id="reply-body" placeholder="Write a reply, or click a template above\u2026"></textarea>'+
            '<div class="compose-hint">Drag the bottom edge to resize. Tokens like {first_name} are auto-filled from the linked claim.</div>'+
            '<div class="reply-preview" id="reply-preview" style="display:none"></div>'+
          '</div>'+
          // ---- Footer actions ----
          // No claim yet  -> primary action is "+ Create Claim"; replying is allowed but secondary
          //                  (use case: ask the requester for missing info before opening a claim).
          // Has claim     -> primary action is "Send Reply" (creates email activity on the claim timeline).
          (function(){
            var hasClaim = !!rec._rma_claim_value;
            var primaryBtn = hasClaim
              ? '<button class="btn primary" id="btn-send" title="Creates an email activity on the claim timeline (marked Sent) and advances to the next email">\u{1F4E4} Send Reply \u2192</button>'
              : '<button class="btn primary" id="btn-create-claim-footer" title="Create an RMA claim from this email and link them together">+ Create Claim</button>';
            var secondaryRow = hasClaim
              ? ''
              : '<div class="row" style="margin-top:6px">'+
                  '<button class="btn ghost" id="btn-send" title="Reply without creating a claim (e.g. to ask the requester for more info). The reply will NOT be linked to a claim.">\u{1F4E4} Send Reply (no claim) \u2192</button>'+
                '</div>';
            return '<div class="actions">'+
              '<div class="row">'+ primaryBtn +'</div>'+
              secondaryRow +
              '<div class="row nav-row" style="margin-top:6px">'+
                '<button class="btn ghost" id="btn-back"'+(hasBackTarget(rec.rma_emaillogid) ? '' : ' disabled')+' title="Go back to the previous email">\u2190 Back</button>'+
                '<button class="btn ghost" id="btn-skip" title="Skip to next unprocessed email">Skip \u2192</button>'+
              '</div>'+
              '<div class="row" style="margin-top:6px">'+
                '<button class="btn ghost" id="btn-done" title="Mark as processed without replying">Mark Done</button>'+
              '</div>'+
              '<div class="queue">Queue: <b>'+queueState.remaining+'</b> of <b>'+queueState.total+'</b> remaining</div>'+
            '</div>';
          })()+
        '</div>'+ // /.pane-col-reply
      '</div>';  // /.pane-cols

    // Wire events
    document.querySelectorAll(".tpl-btn").forEach(function(btn){
      btn.addEventListener("click", function(){
        var id = this.getAttribute("data-id");

    var pvBtn = document.getElementById("btn-preview-toggle");

    var createBtnFooter = $("btn-create-claim-footer");

    // Delegated handlers for editable extracted-field rows:

    var openClaimBtn = $("btn-open-claim");
    if (openClaimBtn) openClaimBtn.addEventListener("click", function(){
      var cid = this.getAttribute("data-claim");
      var X = getParentXrm();
      if (X && X.Navigation && X.Navigation.openForm) {

    document.querySelectorAll(".rs-btn.resolve, .rs-btn.deny").forEach(function(btn){

      });

  // ============================================================
  // FULL-PAGE INBOX MODE
  // ============================================================
  var INBOX_MODE = false;
  var inboxFilter = "unproc"; // 'unproc' | 'today' | 'all' | 'proc'
  var inboxSearch = "";       // free-text client-side filter applied on top of inboxFilter
  var inboxList = [];
  var inboxCounts = { unproc: 0, today: 0, all: 0, proc: 0 };
  var inboxSelectedId = null;

  function detectMode(){
    // Explicit override wins
    var qs = window.location.search;
    if (/[?&]mode=full/.test(qs)) return "full";
    if (/[?&]mode=pane/.test(qs)) return "pane";
    // Heuristic: pane mode is when we're embedded in a form (parent has Xrm.Page with this record)
    var X = getParentXrm();
    var hasForm = false;
    try { hasForm = !!(X && X.Page && X.Page.data && X.Page.data.entity && X.Page.data.entity.getId && X.Page.data.entity.getId()); } catch(e){}
    return hasForm ? "pane" : "full";
  }

  function getInitialEmailIdFromHash(){
    var h = (window.location.hash || "").replace(/^#/, "");
    if (/^[0-9a-fA-F-]{36}$/.test(h)) return h.toLowerCase();
    var m = h.match(/id=([0-9a-fA-F-]{36})/);
    return m ? m[1].toLowerCase() : null;
  }

  function setHashEmail(id){
    try {
      var newHash = id ? ("#"+id) : "";
      if (window.location.hash !== newHash) {
        history.replaceState(null, "", window.location.pathname + window.location.search + newHash);
      }
    } catch(e){}
  }

  function mountInboxShell(){
    document.body.classList.add("inbox-mode");
    // Replace the pane div with the full shell; preserve toast
    var pane = document.getElementById("pane");
    var shellWrap = document.createElement("div");
    shellWrap.innerHTML = buildInboxShellHtml();
    var shell = shellWrap.firstChild;
    pane.parentNode.replaceChild(shell, pane);
    // The right-side reader contains a fresh #pane (created lazily when an email loads)
    // Wire chip clicks
    document.querySelectorAll(".inbox-top .chip").forEach(function(btn){
      btn.addEventListener("click", function(){
        inboxFilter = this.getAttribute("data-filter");
        updateChipActive();
        loadAndRenderInboxList();
      });
    });
    var refreshBtn = document.getElementById("inbox-refresh");
    if (refreshBtn) refreshBtn.addEventListener("click", function(){ loadAndRenderInboxList(); if (inboxSelectedId) loadAll(inboxSelectedId); });
    // Layout toggle (Auto / 2 col / 3 col)
    applySavedLayout();
    document.querySelectorAll("#layout-toggle .lt-btn").forEach(function(btn){
      btn.addEventListener("click", function(){
        setLayout(this.getAttribute("data-layout"));
      });
    });
    // Help button
    var helpBtn = document.getElementById("inbox-help");
    if (helpBtn) helpBtn.addEventListener("click", showKeyboardHelp);
    // Search input (client-side filter on the already-loaded list)
    var searchInput = document.getElementById("inbox-search");
    if (searchInput) {
      var debTimer = null;
      searchInput.addEventListener("input", function(){
        var v = this.value;
        if (debTimer) clearTimeout(debTimer);
        debTimer = setTimeout(function(){ inboxSearch = v; renderInboxList(); }, 150);
      });
      // Esc to clear
      searchInput.addEventListener("keydown", function(e){
        if (e.key === "Escape" && this.value) { e.preventDefault(); this.value = ""; inboxSearch = ""; renderInboxList(); }
      });
    }
    updateChipActive();
  }

  function updateChipActive(){
    document.querySelectorAll(".inbox-top .chip").forEach(function(btn){
      if (btn.getAttribute("data-filter") === inboxFilter) btn.classList.add("active");
      else btn.classList.remove("active");
    });
  }

  // ---------- Layout (Auto / 2-col / 3-col) ----------
  // Persisted in localStorage so the user's pick survives reloads. The active
  // class is applied to <body> so CSS media queries can decide actual breakpoints.
  var LAYOUT_KEY = "rma_email_inbox_layout";
  function readSavedLayout(){
    try { return localStorage.getItem(LAYOUT_KEY) || "auto"; } catch(e){ return "auto"; }
  }
  function saveLayout(name){
    try { localStorage.setItem(LAYOUT_KEY, name); } catch(e){}
  }
  function applySavedLayout(){ setLayout(readSavedLayout(), /*skipSave*/ true); }
  function setLayout(name){
    var skipSave = arguments.length > 1 && arguments[1] === true;
    if (name !== "auto" && name !== "2col" && name !== "3col") name = "auto";
    document.body.classList.remove("layout-auto", "layout-2col", "layout-3col");
    // "auto" intentionally adds no class so the default CSS media queries apply
    if (name === "2col") document.body.classList.add("layout-2col");
    else if (name === "3col") document.body.classList.add("layout-3col");
    document.querySelectorAll("#layout-toggle .lt-btn").forEach(function(btn){
      if (btn.getAttribute("data-layout") === name) btn.classList.add("is-active");
      else btn.classList.remove("is-active");
    });
    if (!skipSave) saveLayout(name);
  }

  function loadInboxList(){
    // Filter clauses
    var filterMap = {
      unproc: "rma_direction eq " + INBOUND + " and rma_isprocessed eq false",
      proc:   "rma_direction eq " + INBOUND + " and rma_isprocessed eq true",
      all:    "rma_direction eq " + INBOUND,
      today:  "rma_direction eq " + INBOUND + " and Microsoft.Dynamics.CRM.Today(PropertyName='rma_receiveddate')"
    };
    var f = filterMap[inboxFilter] || filterMap.unproc;
    // Expand the linked claim so we can show the real contact / customer name
    // (the From: address is almost always 'noreply@ametek.com' because emails come from the web form)
    var path = "rma_emaillogs?$select=rma_emaillogid,rma_subject,rma_fromaddress,rma_receiveddate,rma_bodypreview,rma_isprocessed,_rma_claim_value" +
               "&$expand=rma_Claim($select=rma_contactname,rma_customername)" +
               "&$filter=" + encodeURIComponent(f) +
               "&$orderby=rma_receiveddate desc&$top=200";
    return odata("GET", path).then(function(r){
      inboxList = (r && r.value) || [];
      return inboxList;
    });
  }

  // Resolve the best display name for an inbox row. Priority:
  //   1. linked claim contact / customer (most reliable; already extracted & saved)
  //   2. "Company:" line in the body preview (web-form structured field)
  //   3. signature-block guess in the body preview
  //   4. friendly-cased local part of the From: address (skip noreply forwarders)
  //   5. "AMETEK Web Form" placeholder if the only sender is noreply@ametek.com
  function inboxRowSender(e){
    var claim = e.rma_Claim;
    if (claim) {
      if (claim.rma_contactname)  return claim.rma_contactname;
      if (claim.rma_customername) return claim.rma_customername;
    }
    var preview = e.rma_bodypreview || "";
    var m = preview.match(/Company(?:\s*Name)?\s*:\s*([^\r\n]+)/i);
    if (m) return m[1].trim();
    m = preview.match(/(?:regards|thanks|sincerely|cheers|best),?\s*\n+\s*([A-Z][a-z]+(?:\s+[A-Z][a-z]+){1,3})/i);
    if (m) return m[1].trim();
    var fa = e.rma_fromaddress || "";
    if (fa && !/noreply|no-reply|notification|donotreply/i.test(fa)) {
      var local = fa.split("@")[0] || "";
      return local.replace(/[._-]+/g, " ").replace(/\b\w/g, function(c){ return c.toUpperCase(); });
    }
    if (fa) return "AMETEK Web Form";
    return "(unknown sender)";
  }

  function loadInboxCounts(){
    // Fire 4 lightweight counts in parallel
    var queries = [
      { key:"unproc", filter:"rma_direction eq " + INBOUND + " and rma_isprocessed eq false" },
      { key:"today",  filter:"rma_direction eq " + INBOUND + " and Microsoft.Dynamics.CRM.Today(PropertyName='rma_receiveddate')" },
      { key:"all",    filter:"rma_direction eq " + INBOUND },
      { key:"proc",   filter:"rma_direction eq " + INBOUND + " and rma_isprocessed eq true" }
    ];
    return Promise.all(queries.map(function(q){
      var path = "rma_emaillogs?$select=rma_emaillogid&$filter=" + encodeURIComponent(q.filter) + "&$top=1&$count=true";
      return odata("GET", path).then(function(r){
        var n = (r && (r["@odata.count"] !== undefined ? r["@odata.count"] : ((r.value||[]).length))) || 0;
        inboxCounts[q.key] = n;
      }).catch(function(){ inboxCounts[q.key] = 0; });
    })).then(function(){
      ["unproc","today","all","proc"].forEach(function(k){
        var el = document.getElementById("cnt-"+k);
        if (el) el.textContent = inboxCounts[k];
      });
    });
  }

  function fmtRowTime(iso, fmtFromOData){
    // Prefer the OData FormattedValue when present; otherwise compress to "MM/DD" or "h:mm a"
    var d = iso ? new Date(iso) : null;
    if (!d || isNaN(d.getTime())) return fmtFromOData || "";
    var now = new Date();
    var sameDay = d.toDateString() === now.toDateString();
    if (sameDay) {
      var h = d.getHours(); var m = d.getMinutes(); var ap = h >= 12 ? "PM" : "AM";
      var hh = ((h+11)%12)+1; var mm = m < 10 ? "0"+m : m;
      return hh + ":" + mm + " " + ap;
    }
    var diffDays = Math.floor((now - d) / 86400000);
    if (diffDays < 7) {
      return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
    }
    return (d.getMonth()+1) + "/" + d.getDate();
  }

  function renderInboxList(){
    var host = document.getElementById("inbox-list");
    if (!host) return;
    // Apply client-side search on top of whatever the server returned for the active filter.
    var q = (inboxSearch || "").trim().toLowerCase();
    var filtered = inboxList;
    if (q) {
      filtered = inboxList.filter(function(e){
        var hay = [
          e.rma_subject, e.rma_fromaddress, e.rma_bodypreview,
          (e.rma_Claim ? e.rma_Claim.rma_contactname  : ""),
          (e.rma_Claim ? e.rma_Claim.rma_customername : ""),
          inboxRowSender(e)
        ].join(" \u00b7 ").toLowerCase();
        return hay.indexOf(q) !== -1;
      });
    }
    // Update the small hint next to the search box ("3 of 27")
    var hint = document.getElementById("inbox-search-hint");
    if (hint) {
      hint.innerHTML = q
        ? '<b>' + filtered.length + '</b> of ' + inboxList.length + ' match'
        : '';
    }
    if (!filtered || filtered.length === 0) {
      if (q) {
        host.innerHTML = '<div class="list-empty">' +
          '<div class="big">\u{1F50D}</div>' +
          '<div><b>No matches</b></div>' +
          '<div style="margin-top:6px;font-size:12px;">Nothing in this view matches "<i>' + esc(q) + '</i>".</div>' +
        '</div>';
      } else {
        host.innerHTML = '<div class="list-empty">' +
          '<div class="big">\u{1F389}</div>' +
          '<div><b>Inbox zero!</b></div>' +
          '<div style="margin-top:6px;font-size:12px;">No emails match the current filter.</div>' +
        '</div>';
      }
      return;
    }
    var rows = filtered.map(function(e){
      var id = e.rma_emaillogid;
      var selected = (id && inboxSelectedId && id.toLowerCase() === inboxSelectedId.toLowerCase()) ? " selected" : "";
      var from = inboxRowSender(e);
      var subj = e.rma_subject || "(no subject)";
      var prev = (e.rma_bodypreview || "").replace(/\s+/g, " ").trim();
      var t = fmtRowTime(e.rma_receiveddate, e["rma_receiveddate@OData.Community.Display.V1.FormattedValue"]);
      var linked = !!e._rma_claim_value;
      var pill = e.rma_isprocessed
        ? '<span class="mini-pill proc">Processed</span>'
        : '<span class="mini-pill unproc">New</span>';
      var linkedPill = linked ? '<span class="mini-pill linked">Linked</span>' : '';
      return '<div class="email-row'+selected+'" data-id="'+esc(id)+'">' +
        '<div class="row-top">' +
          '<div class="from">'+esc(from)+'</div>' +
          '<div class="time">'+esc(t)+'</div>' +
        '</div>' +
        '<div class="subj">'+esc(subj)+'</div>' +
        (prev ? '<div class="preview">'+esc(prev)+'</div>' : '') +
        '<div class="row-meta">'+pill+linkedPill+'</div>' +
      '</div>';
    }).join("");
    host.innerHTML = rows;
    host.querySelectorAll(".email-row").forEach(function(row){
      row.addEventListener("click", function(){
        var id = this.getAttribute("data-id");
        selectInboxEmail(id);
      });
    });
  }

  function selectInboxEmail(id){
    if (!id) return;
    inboxSelectedId = id;
    setHashEmail(id);
    renderInboxList(); // refresh selected highlight
    ensurePaneContainer();
    loadAll(id);
  }

  function ensurePaneContainer(){
    // Create or reset a #pane inside the reader so render() has its target
    var wrap = document.getElementById("inbox-reader-wrap");
    if (!wrap) return;
    var existing = document.getElementById("pane");
    if (existing && existing.parentNode === wrap) {
      existing.innerHTML = '<div class="loading">Loading\u2026</div>';
      return;
    }
    wrap.innerHTML = '<div class="pane" id="pane"><div class="loading">Loading\u2026</div></div>';
  }

  function showEmptyReader(){
    var wrap = document.getElementById("inbox-reader-wrap");
    if (!wrap) return;
    wrap.innerHTML = '<div class="inbox-empty-reader" id="inbox-empty">' +
      '<div class="big">\u{1F4E5}</div>' +
      '<div class="h">Select an email</div>' +
      '<div class="sub">Click a message from the list on the left to view its details, extracted claim data, and reply options.</div>' +
    '</div>';
  }

  function loadAndRenderInboxList(){
    var host = document.getElementById("inbox-list");
    if (host) host.innerHTML = '<div class="list-loading">Loading\u2026</div>';
    return Promise.all([loadInboxList(), loadInboxCounts()])
      .then(renderInboxList)
      .catch(function(err){
        console.error("Inbox list load failed:", err);
        if (host) host.innerHTML = '<div class="list-empty"><div>Failed to load.</div><div style="font-size:11px;margin-top:6px;">'+esc(err.message||err)+'</div></div>';
      });
  }

  function initFullMode(){
    INBOX_MODE = true;
    mountInboxShell();
    installKeyboardShortcuts();
    var initialId = getInitialEmailIdFromHash();
    if (initialId) inboxSelectedId = initialId;
    loadAndRenderInboxList().then(function(){
      if (initialId) {
        ensurePaneContainer();
        loadAll(initialId);
      } else if (inboxList.length > 0 && inboxFilter === "unproc") {
        // Auto-select first unprocessed email for a fast-start experience
        selectInboxEmail(inboxList[0].rma_emaillogid);
      }
    });
    // Hash change navigation (e.g., user pastes a new id)
    window.addEventListener("hashchange", function(){
      var id = getInitialEmailIdFromHash();
      if (id && id !== inboxSelectedId) selectInboxEmail(id);
    });
  }

  // ============================================================
  // KEYBOARD SHORTCUTS (inbox / full-page mode only)
  // ============================================================
  // j / k         next / previous email in the loaded list
  // 1..4          apply built-in template (Acknowledge/Need Info/Resolved/Denied)
  // Ctrl+Enter    send & advance (works from inside the reply textarea)
  // /             focus the search box
  // ?             show the cheat-sheet overlay
  // Esc           close overlay (or clear search if focused on search)
  function installKeyboardShortcuts(){
    document.addEventListener("keydown", function(e){
      if (!INBOX_MODE) return;
      var tgt = e.target || {};
      var tag = (tgt.tagName || "").toLowerCase();
      var inField = (tag === "input" || tag === "textarea" || tgt.isContentEditable);
      // Always-allowed combos (even while typing)
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
        var sendBtn = document.getElementById("btn-send");
        if (sendBtn && !sendBtn.disabled) { e.preventDefault(); sendBtn.click(); }
        return;
      }
      if (e.key === "Escape") {
        var overlay = document.getElementById("kbd-help-overlay");
        if (overlay) { overlay.parentNode.removeChild(overlay); return; }
        if (tag === "input" && tgt.id === "inbox-search" && tgt.value) {
          // handled by the input's own keydown
          return;
        }
      }
      // From here on, ignore shortcuts when user is typing in a field
      if (inField) return;
      // "/" focuses search
      if (e.key === "/") {
        var s = document.getElementById("inbox-search");
        if (s) { e.preventDefault(); s.focus(); s.select && s.select(); }
        return;
      }
      // "?" or Shift+/ shows help
      if (e.key === "?" || (e.shiftKey && e.key === "/")) {
        e.preventDefault();
        showKeyboardHelp();
        return;
      }
      // j / k navigation
      if (e.key === "j" || e.key === "J") {
        e.preventDefault();
        navigateInbox(+1);
        return;
      }
      if (e.key === "k" || e.key === "K") {
        e.preventDefault();
        navigateInbox(-1);
        return;
      }
      // 1..4 apply built-in template
      if (/^[1-4]$/.test(e.key)) {
        var idx = parseInt(e.key, 10) - 1;
        var tpl = BUILTIN_TEMPLATES[idx];
        if (tpl) { e.preventDefault(); fillBuiltInTemplate(tpl.key); }
        return;
      }
    });
  }

  function navigateInbox(delta){
    if (!inboxList || inboxList.length === 0) return;
    // Use the visible (filtered) list as the navigation universe
    var q = (inboxSearch || "").trim().toLowerCase();
    var list = inboxList;
    if (q) {
      list = inboxList.filter(function(e){
        var hay = [e.rma_subject, e.rma_fromaddress, e.rma_bodypreview,
          (e.rma_Claim ? e.rma_Claim.rma_contactname  : ""),
          (e.rma_Claim ? e.rma_Claim.rma_customername : ""),
          inboxRowSender(e)].join(" \u00b7 ").toLowerCase();
        return hay.indexOf(q) !== -1;
      });
    }
    if (list.length === 0) return;
    var cur = (inboxSelectedId || "").toLowerCase();
    var idx = -1;
    for (var i = 0; i < list.length; i++) {
      if ((list[i].rma_emaillogid || "").toLowerCase() === cur) { idx = i; break; }
    }
    var nextIdx = (idx === -1)
      ? (delta > 0 ? 0 : list.length - 1)
      : Math.max(0, Math.min(list.length - 1, idx + delta));
    var next = list[nextIdx];
    if (next && next.rma_emaillogid) selectInboxEmail(next.rma_emaillogid);
  }

  // ---------- init ----------
  function init(){
    var mode = detectMode();
    if (mode === "full") { initFullMode(); return; }

    // ---- pane mode (existing behavior) ----
    var id = getRecordId();
    if (!id) {
      // Form not ready yet — retry once after a tick
      setTimeout(function(){
        var id2 = getRecordId();
        if (!id2) { showError("No email record context."); return; }
        loadAll(id2);
      }, 600);
      return;
    }
    loadAll(id);
  }

  function loadAll(id){
    lastRerunResult = null;  // clear stale re-run banner when navigating
    Promise.all([loadRecord(id), loadTemplates(), loadQueue(id)])
      .then(function(results){
        currentRecord = results[0];
        templates = (results[1] && results[1].value) || [];
        // queue state already updated as side-effect inside loadQueue
        pushToHistory(id);
        render();
      })
      .catch(function(err){
        console.error(err);
        showError("Load failed: " + (err.message || err));
      });
  }

  if (document.readyState === "complete" || document.readyState === "interactive") init();
  else document.addEventListener("DOMContentLoaded", init);
})();
</script>
